<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Endor Ewok Academy{% endblock %}</title>
    {% load static %}
    <style>
        :root {
            --primary-bg: #1a1a1a;
            --secondary-bg: #2d3748;
            --text-color: #e2e8f0;
            --accent-color: #48bb78;
            --accent-hover: #38a169;
            --nav-bg: #111;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--nav-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 1.5rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: #fff;
            padding: 0.5rem 1.2rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.1s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-outline {
            background-color: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
        }

        .btn-outline:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        main {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--secondary-bg);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-top: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        footer {
            background-color: var(--nav-bg);
            text-align: center;
            padding: 1.5rem;
            margin-top: auto;
            color: #718096;
            font-size: 0.9rem;
        }

        img.hero-img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin: 1.5rem 0;
            border: 4px solid var(--secondary-bg);
        }

        .text-center {
            text-align: center;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header>
        <a href="{% url 'landing' %}" class="brand">🌲 Endor Academy</a>
        <nav>
            <a href="{% url 'landing' %}">Home</a>
            {% if user.is_authenticated %}
                <a href="{% url 'secret_menu' %}">Secret Menu</a>
                <form action="{% url 'logout' %}" method="post" style="display: inline; margin-left: 1.5rem;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline" style="padding: 0.3rem 0.8rem; font-size: 0.9rem;">Logout ({{ user.username }})</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn">Cafeteria Login</a>
            {% endif %}
        </nav>
    </header>

    <main class="fade-in">
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Endor Ewok Academy. May the forest be with you.</p>
    </footer>
</body>
</html>
